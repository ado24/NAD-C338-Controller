<!DOCTYPE html>
<html lang="en">
<head>
    <title>NAD C338 Control</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NAD C338 Controller Application">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-title" content="NAD C338">

    <link rel="apple-touch-icon" href="/images/nad-logo-192.png">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" as="style">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
</head>
<body>
    <h1>NAD C338 Control</h1>
    <div>
        <button id="toggleNadControls">Toggle<br>NAD Controls</button>
        <button id="darkModeToggle">Toggle<br>Dark Mode</button>
    </div>
    <br/>
    <div id="nad-control-group">
        <div class="control-group" id="power-group">
            <label for="powerOn">Power</label>
            <button id="powerOn">On</button>
            <button id="powerOff">Off</button><br/>
            <input type="checkbox" id="powerToggle">
        </div>
        <div class="control-group" id="volume-group">
            <label for="volume">Volume</label>
            <input type="range" id="volume" min="-80" max="12" step="0.5">
            <input type="text" id="volumeText" value="-20">
            <span id="volumeValue">-20</span> dB
        </div>
        <div class="control-group" id="source-group">
            <label for="source">Source</label>
            <select id="source">
                <option value="Stream">Stream</option>
                <option value="Wireless">Wireless</option>
                <option value="TV">TV</option>
                <option value="Phono">Phono</option>
                <option value="Coax1">Coax1</option>
                <option value="Coax2">Coax2</option>
                <option value="Opt1">Opt1</option>
                <option value="Opt2">Opt2</option>
            </select>
        </div>
        <div class="control-group" id="mute-group">
            <label for="mute">Mute</label>
            <button id="mute">Mute</button>
            <button id="unmute">Unmute</button>
        </div>
        <div class="control-group" id="brightness-group">
            <label for="brightness">Brightness</label>
            <input type="range" id="brightness" min="0" max="3" step="1">
            <input type="text" id="brightnessText" class="text-controls" value="0">
            <span id="brightnessValue">2</span>
        </div>
        <div class="control-group">
            <label for="bassToggle">Bass</label>
            <button id="setBass"   class="bassButtons">Set Bass EQ</button>
            <button id="unsetBass" class="bassButtons">Unset Bass EQ</button><br class="bassButtons"/>
            <input type="checkbox" id="bassToggle">
        </div>
        <div class="control-group" id="auto-sense-group">
            <label for="autoSenseToggle">Auto Sense</label>
            <input type="checkbox" id="autoSenseToggle">
        </div>
        <div class="control-group" id="auto-standby-group">
            <label for="autoStandbyToggle">Auto Standby</label>
            <input type="checkbox" id="autoStandbyToggle">
        </div>
        <div class="control-group" id="timer-group">
            <label for="on-timer">Turn On Timer (seconds):</label>
            <input type="number" id="on-timer" min="0">
            <button id="on-timer-button">Set On Timer</button>
            <br>
            <label for="off-timer">Turn Off Timer (seconds):</label>
            <input type="number" id="off-timer" min="0">
            <button id="off-timer-button">Set Off Timer</button>
        </div>
        <div class="control-group" id="ip-address-group">
            <label for="ipAddress">IP Address</label>
            <input type="text" id="ipAddress" value="10.0.0.251">
            <button id="setIp">Set IP</button>
        </div>
        <div class="control-group" id="refresh-group">
            <button id="refresh">Refresh</button>
        </div>
    </div>

    <!-- BluOS Control -->
    <h1>BluOS Control</h1>
    <div>
        <button id="toggleBluOsControls">Toggle<br>BluOS Controls</button>
        <button id="control-strip-toggle">Toggle<br>Control Strip</button>
    </div>
    <div id="bluOs-control-group">
        <div class="control-group" id="bluOS-play-group">
            <label for="play">Play Controls</label>
            <button id="play">Play</button>
            <button id="pause">Pause</button>
            <button id="skip">Skip</button>
            <button id="back">Back</button>
            <button id="stop">Stop</button>
        </div>
        <div class="control-group" id="bluOS-shuffle-group">
            <label for="shuffleToggle">Shuffle</label>
            <input type="checkbox" id="shuffleToggle">
        </div>
        <div class="control-group" id="bluOS-status-group">
            <label for="getStatus">Status</label>
            <button id="getStatus">Get Status</button>
            <button id="getSyncStatus">Get Sync Status</button>
        </div>
        <div class="control-group" id="bluOS-volume-group">
            <label for="bluOSVolume">Volume</label>
            <input type="range" id="bluOSVolume" min="0" max="100" step="1">
            <input type="text" id="bluOSVolumeText" value="50">
            <span id="bluOSVolumeValue">50</span>
        </div>
        <div class="control-group" id="bluOS-seek-group">
            <label for="seek">Seek</label>
            <input type="range" id="seek" min="0" step="1">
            <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
        </div>
        <div class="control-group" id="bluOS-reboot-group">
            <label for="reboot">Reboot</label>
            <button id="reboot">Reboot</button>
        </div>

        <div class="control-group" id="track-info-group">
            <h2>Currently Playing</h2>
            <img id="trackArt" class="trackArtImg" src="" alt="Track Art">
            <p id="trackTitle">Title: N/A</p>
            <p id="trackArtist">Artist: N/A</p>
            <p id="trackAlbum">Album: N/A</p>
            <p id="streamInfo">Stream Info: N/A</p>
            <span>Quality: </span><span id="qualityType">N/A</span> <!-- New element for quality type -->
            <br class="mqaLabelStyle"/>
            <img id="mqaLabel" class="mqaLabelStyle" src="images/mqa-logo.png" alt="MQA Logo" />
        </div>
        <div class="control-group margin-bottom-large" id="playlist-group">
            <h2>Next 10 Tracks</h2>
            <button id="togglePlaylist">Show Playlist</button>
            <button id="refreshPlaylist">Refresh Playlist</button>
            <button id="editPlaylist" class="btn btn-secondary">
                <i class="fas fa-edit"></i>
            </button>
            <div id="playlist" style="display: none;">
                <ul id="playlistTracks"></ul>
            </div>
        </div>
    </div>

    <div id="control-strip" class="control-strip">
        <div class="control-strip-content">
            <div class="control-strip-info">
                <div id="control-strip-info-container" class="track-info-scroll" data-text="Not Playing">
                    <span id="strip-title" data-text="Not Playing">Not Playing</span>
                </div>
            </div>

            <div class="control-strip-controls">
                <div class="control-strip-buttons">
                    <button id="strip-back" title="Previous"><i class="fas fa-step-backward"></i></button>
                    <button id="strip-play" title="Play/Pause"><i class="fas fa-play"></i></button>
                    <button id="strip-skip" title="Next"><i class="fas fa-step-forward"></i></button>
                </div>

                <div class="control-strip-volume">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="strip-volume" min="0" max="100" value="50">
                    <span id="strip-volume-value">50</span>
                </div>

                <div class="control-strip-seek">
                    <input type="range" id="strip-seek" min="0" step="1">
                    <div class="seek-times">
                        <span id="strip-current-time">0:00</span> / <span id="strip-total-time">0:00</span>
                    </div>
                </div>

                <div class="control-strip-toggles">
                    <button class="toggle-controls" id="strip-toggle-volume" title="Toggle Volume">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button class="toggle-controls" id="strip-toggle-seek" title="Toggle Seek">
                        <i class="fas fa-clock"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/model/interface/IAudioPlayer.js"></script>
    <script type="module" src="js/model/interface/AudioPlayer.js"></script>
    <script type="module" src="js/model/NAD_C338.js"></script>
    <script type="module" src="js/client/nad-client.js"></script>
    <script type="module" src="js/client/bluos-client.js"></script>

    <script type="application/javascript" defer>
        // Register the service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
